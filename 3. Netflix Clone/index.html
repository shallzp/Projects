<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netflix Clone</title>
</head>

<link rel="stylesheet" href="style.css">

<body>
    <header>
        <nav class="navbar container">
            <div class="navbar-logo">
                <img src="./images/netflix_logo.png" class="netflix-logo">
            </div>
            <div class="nav-main">
                <ul>
                    <li class="nav-items active"><a href="#">Home</a></li>
                    <li class="nav-items"><a href="#">TV Shows</a></li>
                    <li class="nav-items"><a href="#">Movies</a></li>
                    <li class="nav-items"><a href="#">News & Popular</a></li>
                    <li class="nav-items"><a href="#">My List</a></li>
                    <li class="nav-items"><a href="#">Browse by Languages</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <ul>
                    <li class="nav-right-item"><img src="./images/icons/search.png" class="search"></li>
                    <li class="nav-right-item"><img src="./images/icons/bell.png" class="bell-notification"></li>
                    <li class="nav-right-item"><img src="./images/icons/user.png" class="user"></li>
                    <li class="nav-right-item center"><img src="./images/icons/dropdown.png" class="dropdown"></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="main-body"></div>
    
    <!-- jquery -->
    <script type="Text/JavaScript" src="script.js"></script>
</body>
</html>
